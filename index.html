<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme AI Labs - Orchestration Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #e9ecef;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #6c757d;
            transition: background 0.3s;
        }
        
        .status-dot.running {
            background: #28a745;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.5);
        }
        
        .status-dot.stopped {
            background: #dc3545;
        }
        
        .status-text {
            font-weight: 600;
            color: #333;
        }
        
        .status-message {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }
        
        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #dc3545, #c92333);
            color: white;
        }
        
        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 53, 69, 0.4);
        }
        
        .btn-refresh {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            grid-column: 1 / -1;
        }
        
        .btn-refresh:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .loading {
            text-align: center;
            color: #666;
            margin-top: 10px;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Acme AI Labs</h1>
            <p class="subtitle">Orchestration System Control Panel</p>
        </div>
        
        <div class="status-card">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Checking status...</span>
            </div>
            <div class="status-message" id="statusMessage"></div>
        </div>
        
        <div class="button-group">
            <button class="btn btn-start" id="startBtn" onclick="startAPI()">
                Start API
            </button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopAPI()">
                Stop API
            </button>
            <button class="btn btn-refresh" onclick="refreshStatus()">
                Refresh Status
            </button>
        </div>
        
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Processing...</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        
        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                if (response.ok) {
                    const data = await response.json();
                    updateUI(true, data);
                } else {
                    updateUI(false, null);
                }
            } catch (error) {
                updateUI(false, null);
            }
        }
        
        function updateUI(isRunning, data) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const statusMessage = document.getElementById('statusMessage');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            if (isRunning) {
                statusDot.className = 'status-dot running';
                statusText.textContent = 'API Running';
                statusMessage.textContent = data ? `${data.service} v${data.version}` : 'Connected';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                statusDot.className = 'status-dot stopped';
                statusText.textContent = 'API Stopped';
                statusMessage.textContent = 'Use Python API Manager to start the server';
                startBtn.disabled = true;
                stopBtn.disabled = true;
            }
        }
        
        async function startAPI() {
            alert('Please use the Python API Manager to start the server:\n\npython api_manager.py\n\nThen type: start');
        }
        
        async function stopAPI() {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/api/stop`, {
                    method: 'POST'
                });
                if (response.ok) {
                    setTimeout(() => {
                        showLoading(false);
                        checkStatus();
                    }, 2000);
                } else {
                    throw new Error('Failed to stop API');
                }
            } catch (error) {
                showLoading(false);
                alert('Error stopping API: ' + error.message);
            }
        }
        
        function refreshStatus() {
            showLoading(true);
            checkStatus().then(() => showLoading(false));
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        // Check status on load
        checkStatus();
        
        // Auto-refresh every 5 seconds
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
